# DeadMan Backend — Render Deployment Configuration
services:
  - type: web
    name: deadman-backend
    env: docker
    repo: https://github.com/H4rshalshah/DeadMan
    dockerfilePath: ./backend/Dockerfile
    rootDir: ./backend
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://deadman-frontend.vercel.app
      - key: FRONTEND_URL
        value: https://deadman-frontend.vercel.app
      - key: BACKEND_URL
        value: https://deadman-backend.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: ENCRYPTION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        value: h4rshal.workspace@gmail.com
